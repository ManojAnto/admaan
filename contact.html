<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ADMAAN DESIGNS | Contact</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}body{color:#333}.container{width:90%;max-width:1200px;margin:auto}
header{background:#0d47a1;color:#fff;position:sticky;top:0;z-index:100}.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 0}
.logo-link{display:flex;align-items:center;color:#fff;text-decoration:none;font-weight:bold;font-size:22px}.logo-img{width:55px;height:55px;border-radius:50%;margin-right:10px}
.menu-toggle{display:none;font-size:28px;cursor:pointer}nav ul{display:flex;list-style:none;gap:25px}nav a{color:#fff;text-decoration:none;font-weight:bold}
.hero{background:linear-gradient(to right,#0d47a1,#1976d2);color:#fff;padding:80px 0}.hero-inner{display:flex;align-items:center;justify-content:center;text-align:center}
.btn{display:inline-block;background:#0d47a1;color:#fff;padding:14px 30px;border-radius:30px;text-decoration:none;margin-top:20px;border:none;cursor:pointer}.btn:hover{background:#1976d2}
section{padding:60px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px}
.contact-layout{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
    align-items:start;
}

.left-column .card{
    height:100%;
}

.right-column{
    display:flex;
    flex-direction:column;
    gap:20px;
}

@media(max-width:768px){
    .contact-layout{
        grid-template-columns:1fr;
    }
}
  
  .card{padding:25px;box-shadow:0 5px 15px rgba(0,0,0,.1);border-radius:10px}
  .company-card{
    background:linear-gradient(135deg,#ffffff,#f8fbff);
}

.company-card h2{
    color:#0d47a1;
    margin-bottom:20px;
    text-align:center;
}

.info-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 16px;
    margin-bottom:12px;
    background:#f4f8ff;
    border-left:5px solid #0d47a1;
    border-radius:8px;
    transition:.3s;
}

.info-item:hover{
    background:#0d47a1;
    color:#fff;
    transform:translateX(6px);
}

.info-item span{
    font-weight:bold;
}

.info-item strong{
    text-align:right;
    max-width:55%;
}
input,textarea{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:6px}
.contact-item{margin:12px 0;font-size:16px}.icon{display:inline-block;width:28px}
table{width:100%;border-collapse:collapse}td{padding:8px;border-bottom:1px solid #eee}
footer{background:#0d47a1;color:#fff;text-align:center;padding:20px}
@media(max-width:768px){.navbar{flex-direction:column;align-items:stretch}.topbar{display:flex;justify-content:space-between}.menu-toggle{display:block}nav{display:none}nav.active{display:block}nav ul{flex-direction:column;gap:0}nav a{display:block;padding:14px;text-align:center;border-top:1px solid rgba(255,255,255,.15)}}
</style></head><body>

<nav id="nav"><ul><li><a href="index.html">Home</a></li><li><a href="about.html">About</a></li><li><a href="services.html">Services</a></li><li><a href="projects.html">Projects</a></li><li><a href="clients.html">Clients</a></li><li><a href="contact.html">Contact</a></li></ul></nav></div></header>
<section class="hero"><div class="container hero-inner"><div><h1>Contact Us</h1><p>Get in touch for project inquiries, quotations and partnerships.</p></div></div></section>
